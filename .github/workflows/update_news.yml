name: Update Colombia News

on:
  schedule:
    - cron: '0 11,23 * * *' # 6AM and 6PM EST (UTC 11:00, 23:00)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python fetch_news.py

      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p docs
          git add docs/colombia_news.json
          git commit -m "Automated news update: colombia" || exit 0
          git push
